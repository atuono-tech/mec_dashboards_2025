<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meninas em Campo · Publicações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde-clr: #4ec77c;
      --ouro-clr:  #f5d27a;
      --branco:    #f7f9f5;
      --bg:        #0e1710;
      --text:      #d8e8d9;
      --text-dim:  #7aa482;
      --card-bdr:  rgba(78,199,124,0.15);
      --card-bg:   rgba(28,43,30,0.7);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(26,107,58,.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(45,145,88,.2) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(78,199,124,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(78,199,124,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative; z-index: 10;
      padding: 3.5rem 2rem 2rem;
      max-width: 980px; margin: 0 auto;
    }
    .badge {
      display: inline-flex; align-items: center; gap: .45rem;
      font-size: .72rem; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: var(--verde-clr);
      border: 1px solid rgba(78,199,124,.3); border-radius: 999px;
      padding: .3rem .85rem; margin-bottom: 1.4rem;
      background: rgba(78,199,124,.06); animation: fadeUp .6s ease both;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--verde-clr); box-shadow: 0 0 8px var(--verde-clr);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.8); }
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem,5vw,3.4rem);
      font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
      color: var(--branco); animation: fadeUp .7s .1s ease both;
    }
    h1 span { color: var(--verde-clr); }
    .subtitle {
      margin-top: .9rem; font-size: 1rem; font-weight: 300;
      color: var(--text-dim); max-width: 520px; line-height: 1.6;
      animation: fadeUp .7s .2s ease both;
    }

    .search-wrap {
      position: relative; z-index: 10;
      max-width: 980px; margin: 0 auto;
      padding: 0 2rem 2rem; animation: fadeUp .7s .3s ease both;
    }
    .search-row { display: flex; gap: .75rem; flex-wrap: wrap; position: relative; }
    .search-input {
      flex: 1; min-width: 220px;
      background: var(--card-bg); border: 1px solid var(--card-bdr);
      border-radius: 10px; padding: .7rem 1.1rem .7rem 2.8rem;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: .93rem; outline: none; transition: border-color .2s;
      backdrop-filter: blur(8px);
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--verde-clr); }
    .search-icon {
      position: absolute; left: .85rem; top: 50%;
      transform: translateY(-50%); color: var(--text-dim); pointer-events: none;
    }

    .grid-wrap {
      position: relative; z-index: 10;
      max-width: 980px; margin: 0 auto; padding: 0 2rem 5rem;
    }
    .section-title {
      font-family: 'Syne', sans-serif; font-size: .75rem; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 1.2rem; padding-bottom: .6rem;
      border-bottom: 1px solid rgba(78,199,124,.1);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1rem;
    }

    .card {
      position: relative; background: var(--card-bg);
      border: 1px solid var(--card-bdr); border-radius: 14px;
      padding: 1.4rem 1.4rem 1.1rem; text-decoration: none;
      color: inherit; display: flex; flex-direction: column; gap: .6rem;
      backdrop-filter: blur(10px);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
      animation: fadeUp .5s ease both; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(78,199,124,.06) 0%,transparent 60%);
      opacity: 0; transition: opacity .3s;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(78,199,124,.5);
      box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(78,199,124,.1);
    }
    .card:hover::before { opacity: 1; }
    .card-top { display: flex; align-items: center; gap: .7rem; }
    .card-emoji { font-size: 1.3rem; line-height: 1; }
    .card-label {
      font-family: 'Syne', sans-serif; font-size: .65rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase; color: var(--verde-clr); opacity: .8;
    }
    .card-title {
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      color: var(--branco); line-height: 1.25;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: .4rem; padding-top: .8rem;
      border-top: 1px solid rgba(78,199,124,.08);
    }
    .card-file {
      font-size: .73rem; color: var(--text-dim); opacity: .7;
      font-family: 'Courier New', monospace; word-break: break-all;
    }
    .card-arrow {
      color: var(--verde-clr); opacity: 0; transform: translateX(-4px);
      transition: opacity .2s, transform .2s; font-size: .9rem; flex-shrink: 0;
    }
    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    .state {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 1rem; color: var(--text-dim); font-size: .95rem;
    }
    .spinner {
      width: 32px; height: 32px; border: 2px solid rgba(78,199,124,.2);
      border-top-color: var(--verde-clr); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      position: relative; z-index: 10; text-align: center;
      padding: 2rem; font-size: .78rem; color: var(--text-dim);
      border-top: 1px solid rgba(78,199,124,.07);
    }
    footer a { color: var(--verde-clr); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @media (max-width: 500px) {
      header, .search-wrap, .grid-wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="badge">Meninas em Campo</div>
  <h1>Painel de <span>Publicações</span></h1>
  <p class="subtitle">Acesso centralizado a todos os relatórios, dashboards e documentos do projeto.</p>
</header>

<div class="search-wrap">
  <div class="search-row">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="searchInput" type="search" placeholder="Buscar arquivo…" autocomplete="off" />
  </div>
</div>

<div class="grid-wrap">
  <div class="section-title" id="sectionTitle">Carregando…</div>
  <div class="grid" id="grid">
    <div class="state">
      <div class="spinner"></div>
      Buscando arquivos no repositório…
    </div>
  </div>
</div>

<footer>
  <p>
    <a href="https://github.com/atuono-tech/mec_dashboards_2025" target="_blank">
      github.com/atuono-tech/mec_dashboards_2025
    </a>
    &nbsp;·&nbsp; Meninas em Campo · Colégio Santa Cruz
  </p>
</footer>

<script>
  const REPO  = "atuono-tech/mec_dashboards_2025";
  const OWNER = REPO.split("/")[0];
  const RNAME = REPO.split("/")[1];
  const BASE  = `https://${OWNER}.github.io/${RNAME}/`;
  const API   = `https://api.github.com/repos/${REPO}/contents/`;

  function prettify(filename) {
    return filename
      .replace(/\.html$/i, "")
      .replace(/[-_]/g, " ")
      .replace(/\b(\w)/g, c => c.toUpperCase())
      .trim();
  }

  function emoji(name) {
    const n = name.toLowerCase();
    if (n.includes("dashboard"))  return "📊";
    if (n.includes("relatorio") || n.includes("relat") || n.includes("impacto")) return "📄";
    if (n.includes("compilado") || n.includes("livro") || n.includes("atividade")) return "📚";
    if (n.includes("lie") || n.includes("ciclo") || n.includes("esporte")) return "⚽";
    return "🔗";
  }

  function label(name) {
    const n = name.toLowerCase();
    if (n.includes("dashboard"))  return "Dashboard";
    if (n.includes("relatorio") || n.includes("relat") || n.includes("impacto")) return "Relatório";
    if (n.includes("compilado") || n.includes("livro"))  return "Livro / Compilado";
    if (n.includes("lie") || n.includes("ciclo"))        return "LIE";
    return "Documento";
  }

  let allFiles  = [];
  let searchTerm = "";

  function render() {
    const grid  = document.getElementById("grid");
    const title = document.getElementById("sectionTitle");
    const q = searchTerm.toLowerCase();
    const filtered = allFiles.filter(f =>
      !q || f.name.toLowerCase().includes(q) || prettify(f.name).toLowerCase().includes(q)
    );
    title.textContent = filtered.length
      ? `${filtered.length} arquivo${filtered.length === 1 ? "" : "s"} encontrado${filtered.length === 1 ? "" : "s"}`
      : "Publicações disponíveis";
    if (!filtered.length) {
      grid.innerHTML = `<div class="state">Nenhum arquivo encontrado para "<strong>${searchTerm}</strong>".</div>`;
      return;
    }
    grid.innerHTML = filtered.map((f, i) => `
      <a class="card" href="${BASE + f.name}" style="animation-delay:${i * 0.07}s">
        <div class="card-top">
          <span class="card-emoji">${emoji(f.name)}</span>
          <span class="card-label">${label(f.name)}</span>
        </div>
        <div class="card-title">${prettify(f.name)}</div>
        <div class="card-footer">
          <span class="card-file">${f.name}</span>
          <span class="card-arrow">→</span>
        </div>
      </a>`).join("");
  }

  async function load() {
    try {
      const res = await fetch(API, { headers: { "Accept": "application/vnd.github+json" } });
      if (!res.ok) throw new Error(`GitHub API retornou ${res.status}`);
      const data = await res.json();
      allFiles = data
        .filter(f => f.type === "file" && /\.html$/i.test(f.name) && f.name.toLowerCase() !== "index.html")
        .sort((a, b) => a.name.localeCompare(b.name));
      if (!allFiles.length) {
        document.getElementById("sectionTitle").textContent = "Nenhum arquivo encontrado";
        document.getElementById("grid").innerHTML =
          `<div class="state">O repositório ainda não contém arquivos <code>.html</code> além desta página.</div>`;
        return;
      }
      render();
    } catch (err) {
      document.getElementById("sectionTitle").textContent = "Erro ao carregar";
      document.getElementById("grid").innerHTML =
        `<div class="state">⚠️ Não foi possível listar os arquivos.<br><small>${err.message}</small></div>`;
    }
  }

  document.getElementById("searchInput").addEventListener("input", e => {
    searchTerm = e.target.value;
    render();
  });

  load();
</script>
</body>
</html>
