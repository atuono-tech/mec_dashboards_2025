    :root {
      --verde:   #42ce02;
      --laranja: #f34b06;
      --roxo:    #8010ff;
      --amarelo: #f3ce02;
      --azul:    #354d73;
      --branco:  #EEEEEE;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Arial Narrow', Arial, sans-serif;
      background: var(--azul);
      color: var(--branco);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    header {
      position: relative; z-index: 10;
      padding: 3rem 2.5rem 0;
      max-width: 1100px; margin: 0 auto;
    }
    .logo-bar {
      display: flex; align-items: flex-end; justify-content: space-between;
      border-bottom: 2px solid var(--verde);
      padding-bottom: 1rem; margin-bottom: 2rem;
      flex-wrap: wrap; gap: 1rem;
    }
    .logo-text {
      font-family: 'Pressio', 'Arial Narrow', Arial, sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 900;
      line-height: .9;
      text-transform: uppercase;
      color: var(--branco);
    }
    .logo-text span { color: var(--verde); }
    .badge-projeto {
      font-family: 'Pressio', 'Arial Narrow', Arial, sans-serif;
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--verde);
      padding: .35rem .9rem;
      border: 1.5px solid var(--verde);
      border-radius: 2px;
      white-space: nowrap;
      align-self: center;
    }
    .subtitle {
      font-size: .9rem;
      color: rgba(238,238,238,.55);
      margin-bottom: 2rem;
      letter-spacing: .02em;
    }
    .search-wrap {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto;
      padding: 0 2.5rem 2rem;
    }
    .search-row { display: flex; gap: .75rem; flex-wrap: wrap; position: relative; }
    .search-input {
      flex: 1; min-width: 220px;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 2px;
      padding: .75rem 1.1rem .75rem 2.9rem;
      color: var(--branco);
      font-family: 'Arial Narrow', Arial, sans-serif;
      font-size: .95rem; outline: none;
      transition: border-color .2s;
    }
    .search-input::placeholder { color: rgba(238,238,238,.3); }
    .search-input:focus { border-color: var(--verde); }
    .search-icon {
      position: absolute; left: .9rem; top: 50%;
      transform: translateY(-50%);
      color: rgba(238,238,238,.35); pointer-events: none;
    }
    .grid-wrap {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto;
      padding: 0 2.5rem 5rem;
    }
    .section-label {
      font-family: 'Pressio', 'Arial Narrow', Arial, sans-serif;
      font-size: .68rem; letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(238,238,238,.35);
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.08);
    }
    .card {
      position: relative;
      background: var(--azul);
      padding: 1.6rem 1.5rem 1.2rem;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: .4rem;
      transition: background .18s;
      overflow: hidden;
      min-height: 155px;
    }
    .card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent, var(--verde));
      transition: width .2s;
    }
    .card:hover { background: rgba(255,255,255,.055); }
    .card:hover::before { width: 5px; }
    .card-label {
      font-family: 'Pressio', 'Arial Narrow', Arial, sans-serif;
      font-size: .6rem; letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent, var(--verde));
    }
    .card-title {
      font-family: 'Pressio', 'Arial Narrow', Arial, sans-serif;
      font-size: 1.3rem; font-weight: 900;
      text-transform: uppercase;
      color: var(--branco);
      line-height: 1.08;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: .85rem;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .card-file {
      font-size: .68rem;
      color: rgba(238,238,238,.3);
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }
    .card-arrow {
      color: var(--accent, var(--verde));
      opacity: 0; transform: translateX(-5px);
      transition: opacity .18s, transform .18s;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }
    .state {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 1rem;
      color: rgba(238,238,238,.35); font-size: .9rem;
      background: var(--azul);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(66,206,2,.2);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto;
      padding: 1.5rem 2.5rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .75rem;
      border-top: 1px solid rgba(255,255,255,.07);
      font-size: .73rem; color: rgba(238,238,238,.3);
    }
    footer a { color: var(--verde); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .color-dots { display: flex; gap: 5px; align-items: center; }
    .color-dot { width: 8px; height: 8px; border-radius: 50%; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeIn .4s ease both; }
    @media (max-width: 560px) {
      header, .search-wrap, .grid-wrap, footer { padding-left: 1.2rem; padding-right: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-bar">
    <div class="logo-text">Meninas<br>em <span>Campo</span></div>
    <div class="badge-projeto">Publicações · 2025</div>
  </div>
  <p class="subtitle">Acesso centralizado a relatórios, dashboards e documentos do projeto.</p>
</header>

<div class="search-wrap">
  <div class="search-row">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="searchInput" type="search" placeholder="Buscar arquivo…" autocomplete="off" />
  </div>
</div>

<div class="grid-wrap">
  <div class="section-label" id="sectionTitle">Carregando…</div>
  <div class="grid" id="grid">
    <div class="state">
      <div class="spinner"></div>
      Buscando arquivos no repositório…
    </div>
  </div>
</div>

<footer>
  <a href="https://github.com/atuono-tech/mec_dashboards_2025" target="_blank">
    github.com/atuono-tech/mec_dashboards_2025
  </a>
  <div class="color-dots">
    <div class="color-dot" style="background:#42ce02"></div>
    <div class="color-dot" style="background:#f34b06"></div>
    <div class="color-dot" style="background:#8010ff"></div>
    <div class="color-dot" style="background:#f3ce02"></div>
    <div class="color-dot" style="background:#354d73; border:1px solid rgba(255,255,255,.2)"></div>
  </div>
</footer>

<script>
  var REPO  = "atuono-tech/mec_dashboards_2025";
  var OWNER = REPO.split("/")[0];
  var RNAME = REPO.split("/")[1];
  var BASE  = "https://" + OWNER + ".github.io/" + RNAME + "/";
  var API   = "https://api.github.com/repos/" + REPO + "/contents/";

  function accent(name) {
    var n = name.toLowerCase();
    if (n.indexOf("dashboard") >= 0)                                        return "#42ce02";
    if (n.indexOf("relatorio") >= 0 || n.indexOf("impacto") >= 0)          return "#f34b06";
    if (n.indexOf("compilado") >= 0 || n.indexOf("livro") >= 0)            return "#8010ff";
    if (n.indexOf("lie") >= 0 || n.indexOf("ciclo") >= 0)                  return "#f3ce02";
    return "#42ce02";
  }

  function label(name) {
    var n = name.toLowerCase();
    if (n.indexOf("dashboard") >= 0)                                        return "Dashboard";
    if (n.indexOf("relatorio") >= 0 || n.indexOf("impacto") >= 0)          return "Relatório";
    if (n.indexOf("compilado") >= 0 || n.indexOf("livro") >= 0)            return "Livro / Compilado";
    if (n.indexOf("lie") >= 0 || n.indexOf("ciclo") >= 0)                  return "LIE";
    return "Documento";
  }

  function prettify(filename) {
    return filename
      .replace(/\.html$/i, "")
      .replace(/[-_]/g, " ")
      .replace(/(\w)/g, function(c) { return c.toUpperCase(); })
      .trim();
  }

  var allFiles = [];
  var searchTerm = "";

  function render() {
    var grid  = document.getElementById("grid");
    var title = document.getElementById("sectionTitle");
    var q = searchTerm.toLowerCase();
    var filtered = allFiles.filter(function(f) {
      return !q || f.name.toLowerCase().indexOf(q) >= 0 || prettify(f.name).toLowerCase().indexOf(q) >= 0;
    });
    title.textContent = filtered.length
      ? filtered.length + " arquivo" + (filtered.length === 1 ? "" : "s") + " encontrado" + (filtered.length === 1 ? "" : "s")
      : "Publicações disponíveis";
    if (!filtered.length) {
      grid.innerHTML = "<div class="state">Nenhum arquivo encontrado.</div>";
      return;
    }
    grid.innerHTML = filtered.map(function(f, i) {
      var ac = accent(f.name);
      return "<a class="card" href="" + BASE + f.name + "" style="--accent:" + ac + "; animation-delay:" + (i*0.06) + "s">" +
        "<div class="card-label">" + label(f.name) + "</div>" +
        "<div class="card-title">" + prettify(f.name) + "</div>" +
        "<div class="card-footer">" +
          "<span class="card-file">" + f.name + "</span>" +
          "<span class="card-arrow">→</span>" +
        "</div></a>";
    }).join("");
  }

  async function load() {
    try {
      var res = await fetch(API, { headers: { "Accept": "application/vnd.github+json" } });
      if (!res.ok) throw new Error("GitHub API: " + res.status);
      var data = await res.json();
      allFiles = data
        .filter(function(f) { return f.type === "file" && /\.html$/i.test(f.name) && f.name.toLowerCase() !== "index.html"; })
        .sort(function(a, b) { return a.name.localeCompare(b.name); });
      if (!allFiles.length) {
        document.getElementById("sectionTitle").textContent = "Nenhum arquivo";
        document.getElementById("grid").innerHTML = "<div class="state">Nenhum .html encontrado além desta página.</div>";
        return;
      }
      render();
    } catch(err) {
      document.getElementById("sectionTitle").textContent = "Erro";
      document.getElementById("grid").innerHTML = "<div class="state">⚠️ " + err.message + "</div>";
    }
  }

  document.getElementById("searchInput").addEventListener("input", function(e) {
    searchTerm = e.target.value;
    render();
  });

  load();
</script>
</body>
</html>
